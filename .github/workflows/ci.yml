name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pillow

      - name: Build C++ solvers
        run: |
          make -C solvers/lbm
          make -C solvers/incompressible
          make -C solvers/compressible
          make -C solvers/sph

      - name: Smoke + validation tests
        run: python tests/smoke_test.py
